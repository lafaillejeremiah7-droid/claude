<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BTC POLYMARKET TERMINAL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#050505;--panel:#0a0a0a;--amber:#f0c419;--amber2:#ffb000;--amber3:#d4a012;--green:#26d07c;--red:#ff4d4d;--border:rgba(240,196,25,0.2);--border2:rgba(240,196,25,0.3);--glow:0 0 8px rgba(240,196,25,0.4);}
body{background:var(--bg);color:var(--amber);font-family:'JetBrains Mono','SF Mono',Consolas,monospace;font-size:10px;line-height:1.4;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(240,196,25,0.012) 0px,transparent 1px,transparent 2px);}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.5) 100%);}
#app{position:relative;z-index:1;padding:0;max-width:100vw;}
.topbar{display:flex;align-items:center;height:28px;padding:0 10px;border-bottom:1px solid var(--border);background:#080808;gap:8px;}
.topbar .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.topbar .acct{font-size:9px;color:var(--amber3);opacity:0.7;}
.topbar .brand{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--amber);text-shadow:var(--glow);}
.topbar .mid{flex:1;display:flex;justify-content:center;gap:16px;font-size:9px;}
.topbar .mid span{color:var(--amber3);}
.topbar .mid .val{color:var(--amber);text-shadow:var(--glow);}
.topbar .clock{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--amber2);text-shadow:var(--glow);}
.ticker{height:20px;overflow:hidden;border-bottom:1px solid var(--border);background:#070707;display:flex;align-items:center;padding:0 10px;font-size:9px;gap:20px;color:var(--amber3);}
.ticker .hl{color:var(--green);font-weight:700;}
.row{display:grid;gap:1px;padding:1px;}
.row3{grid-template-columns:1fr 1.8fr 1fr;}
.row1{grid-template-columns:2fr 1fr;}
.rowfull{grid-template-columns:1fr;}
.row3b{grid-template-columns:1fr 1.5fr 1fr;}
.panel{background:var(--panel);border:1px solid var(--border);padding:8px 10px;position:relative;}
.panel-title{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber3);margin-bottom:6px;font-weight:700;}
.big{font-size:22px;font-weight:700;text-shadow:var(--glow);letter-spacing:-0.5px;}
.green{color:var(--green);}
.red{color:var(--red);}
.dim{color:var(--amber3);opacity:0.6;}
.badge{display:inline-block;padding:1px 6px;font-size:8px;font-weight:700;border-radius:2px;letter-spacing:0.5px;}
.badge-live{background:rgba(38,208,124,0.15);color:var(--green);border:1px solid rgba(38,208,124,0.3);}
.stat-row{display:flex;gap:12px;margin-top:4px;font-size:9px;}
.stat-row span{color:var(--amber3);}
.stat-row .v{color:var(--amber);}
.pipeline{display:flex;align-items:center;gap:0;padding:6px 0;}
.pipe-step{padding:4px 12px;font-size:8px;font-weight:700;letter-spacing:1px;border:1px solid var(--border);color:var(--amber3);background:#080808;}
.pipe-step.active{color:var(--green);border-color:rgba(38,208,124,0.4);background:rgba(38,208,124,0.05);text-shadow:0 0 6px rgba(38,208,124,0.4);}
.pipe-arrow{color:var(--amber3);font-size:8px;padding:0 2px;opacity:0.4;}
.feed-item{display:flex;align-items:center;gap:6px;padding:2px 0;border-bottom:1px solid rgba(240,196,25,0.05);font-size:9px;}
.feed-item .time{color:var(--amber3);width:50px;flex-shrink:0;font-size:8px;}
.feed-item .action{padding:1px 5px;font-size:7px;font-weight:700;letter-spacing:0.5px;border-radius:1px;}
.feed-item .action.OPEN{background:rgba(38,208,124,0.12);color:var(--green);}
.feed-item .action.CLOSE{background:rgba(240,196,25,0.12);color:var(--amber);}
.feed-item .action.REJECTED{background:rgba(255,77,77,0.1);color:var(--red);}
.feed-item .action.NEAR_MISS{background:rgba(255,77,77,0.08);color:var(--red);opacity:0.7;}
.feed-item .action.SCAN{background:rgba(240,196,25,0.05);color:var(--amber3);}
.metrics-bar{height:10px;background:#111;border:1px solid var(--border);margin:3px 0;position:relative;overflow:hidden;}
.metrics-fill{height:100%;transition:width 0.3s;}
canvas.graph{width:100%;height:220px;display:block;}
canvas.chart{width:100%;height:140px;display:block;}
.footer{height:20px;border-top:1px solid var(--border);background:#070707;display:flex;align-items:center;padding:0 10px;font-size:8px;color:var(--amber3);gap:16px;overflow:hidden;}
.trophy-box{border:2px solid var(--amber2);background:rgba(10,10,10,0.95);padding:30px 50px;text-align:center;max-width:400px;}
.trophy-title{font-size:11px;letter-spacing:3px;color:var(--amber);margin-bottom:6px;}
.trophy-amount{font-size:36px;font-weight:700;color:var(--green);text-shadow:0 0 12px rgba(38,208,124,0.5);}
.trophy-sub{font-size:9px;color:var(--amber3);margin-top:6px;}
.empty{color:var(--amber3);opacity:0.4;font-style:italic;font-size:9px;padding:8px 0;text-align:center;}
@media(max-width:900px){.row3,.row3b{grid-template-columns:1fr;}.row1{grid-template-columns:1fr;}}
</style>

// Clock
setInterval(()=>{
  const d=new Date();
  $('clock').textContent=[d.getUTCHours(),d.getUTCMinutes(),d.getUTCSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
},1000);

// Graph nodes
const graphNodes=[];
const nodeColors=['#ff4d4d','#26d07c','#f0c419','#d4a012','#8844ff','#ff8800'];
(function initNodes(){
  for(let i=0;i<20;i++){
    graphNodes.push({x:0.1+Math.random()*0.8,y:0.1+Math.random()*0.8,vx:(Math.random()-0.5)*0.0005,vy:(Math.random()-0.5)*0.0005,r:3+Math.random()*4,color:nodeColors[Math.floor(Math.random()*nodeColors.length)],connections:[]});
  }
  // Create connections
  graphNodes.forEach((n,i)=>{
    const numConn=1+Math.floor(Math.random()*3);
    for(let c=0;c<numConn;c++){
      const target=Math.floor(Math.random()*graphNodes.length);
      if(target!==i)n.connections.push(target);
    }
  });
})();

function drawGraph(time){
  const canvas=$('graphCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.offsetWidth*2;
  const H=canvas.height=440;
  canvas.style.height='220px';
  ctx.clearRect(0,0,W,H);
  const t=time*0.001;

  // Update nodes
  graphNodes.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0.05||n.x>0.95)n.vx*=-1;
    if(n.y<0.05||n.y>0.95)n.vy*=-1;
    n.vx+=(Math.random()-0.5)*0.00003;
    n.vy+=(Math.random()-0.5)*0.00003;
    n.vx=Math.max(-0.001,Math.min(0.001,n.vx));
    n.vy=Math.max(-0.001,Math.min(0.001,n.vy));
  });

  // Draw connections
  graphNodes.forEach((n,i)=>{
    n.connections.forEach(ti=>{
      const t2=graphNodes[ti];
      if(!t2)return;
      const pulse=0.15+0.1*Math.sin(t+i);
      ctx.strokeStyle='rgba(240,196,25,'+pulse+')';
      ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(n.x*W,n.y*H);ctx.lineTo(t2.x*W,t2.y*H);ctx.stroke();
    });
  });

  // Draw nodes
  graphNodes.forEach((n,i)=>{
    const x=n.x*W,y=n.y*H;
    const pulse=0.5+0.5*Math.sin(t*2+i);
    ctx.beginPath();ctx.arc(x,y,n.r*2,0,Math.PI*2);
    ctx.fillStyle=n.color.replace(')',','+pulse*0.3+')').replace('rgb','rgba').replace('#','');
    // Use hex to rgba
    const hex=n.color;
    const r2=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    ctx.fillStyle='rgba('+r2+','+g+','+b+','+(pulse*0.3)+')';
    ctx.fill();
    ctx.beginPath();ctx.arc(x,y,n.r,0,Math.PI*2);
    ctx.fillStyle=n.color;
    ctx.shadowColor=n.color;ctx.shadowBlur=6;
    ctx.fill();ctx.shadowBlur=0;
  });
}

// Candle chart placeholder
function drawCandles(){
  const canvas=$('candleCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.offsetWidth*2;
  const H=canvas.height=280;
  canvas.style.height='140px';
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='var(--amber3)';
  ctx.font='18px JetBrains Mono, monospace';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(240,196,25,0.3)';
  ctx.fillText('AWAITING PRICE DATA',W/2,H/2);
}

let animFrame=null;
function animate(time){
  if(document.hidden){animFrame=requestAnimationFrame(animate);return;}
  drawGraph(time);
  animFrame=requestAnimationFrame(animate);
}
animFrame=requestAnimationFrame(animate);
drawCandles();

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}}
  else{if(!animFrame)animFrame=requestAnimationFrame(animate);}
});

// Render data
let _lastSnapAt=null,_lastAge=0;

function render(snap){
  if(!snap)return;
  S.snapshot=snap;
  _lastSnapAt=Date.now();
  _lastAge=snap.data_age_seconds||0;

  const acct=snap.account||{};
  const pnl=snap.pnl||{};
  const ws=snap.win_stats||{};
  const conf=snap.confidence||{};
  const bs=snap.bot_status||{};

  // Top bar
  const eq=typeof acct.equity==='number'?acct.equity:null;
  $('tbBtc').textContent=eq?'$'+eq.toFixed(0):'--';
  $('tbXau').textContent='--';
  const totalT=(ws.wins||0)+(ws.losses||0);
  $('tbTrades').textContent=totalT;
  const wr=typeof ws.daily_win_rate==='number'?ws.daily_win_rate:(totalT>0?((ws.wins||0)/totalT*100):null);
  $('tbWin').textContent=wr!=null?Math.round(wr)+'%':'--';

  // Ticker
  $('tickerEquity').textContent='EQUITY '+(eq?money(eq):'--');
  $('tickerPnl').textContent='P&L '+(typeof pnl.daily_realized==='number'?money(pnl.daily_realized):'--');

  // Account panel
  const cumPnl=typeof pnl.cumulative_realized==='number'?pnl.cumulative_realized:(typeof pnl.daily_realized==='number'?pnl.daily_realized:null);
  const heroPnlEl=$('heroPnl');
  if(cumPnl!=null){
    heroPnlEl.textContent=(cumPnl>=0?'+':'')+money(cumPnl);
    heroPnlEl.className='big '+(cumPnl>=0?'green':'red');
  }else{heroPnlEl.textContent='--';heroPnlEl.className='big';}
  $('heroTrades').textContent=totalT;
  $('heroWinPct').textContent=wr!=null?wr.toFixed(1)+'%':'--';
  $('heroRR').textContent='2:1';
  $('heroGate').textContent=conf.gate_available?conf.gate.toFixed(1)+'/10':'--';
  $('heroRealized').textContent=typeof pnl.daily_realized==='number'?money(pnl.daily_realized):'--';

  // Pipeline - check for scan cycle animation trigger
  const snapUpdate=snap.last_update_utc||null;
  if(snapUpdate&&snapUpdate!==_lastUpdateSeen){
    if(_lastUpdateSeen!==null){
      // New scan cycle detected — fire animation
      triggerPipelineAnimation(snap.positions||[]);
    }
    _lastUpdateSeen=snapUpdate;
  }
  renderPipeline(bs,snap.positions||[]);

  // Countdown
  const age=snap.data_age_seconds||bs.seconds_since_last_file_mod||0;
  const secs=Math.max(0,SCAN_INTERVAL-Math.round(age));
  $('pipeCountdown').textContent=secs+'s';
  $('pipeElapsed').textContent=(Math.min(age,2.7)).toFixed(2)+'s';

  // Traders panel (from feed wins)
  renderTraders(snap.feed||[]);

  // Feed
  renderFeed(snap.feed||[]);

  // Live Prices
  renderLivePrices(snap);

  // Metrics
  renderMetrics(ws,conf);

  // Graph stats
  $('grTrades').textContent=totalT;
  $('grCI').textContent=conf.gate_available?conf.gate.toFixed(1):'--';
  $('graphStats').textContent='Tick '+(eq?'$'+eq.toFixed(0):'--')+' | CI '+(conf.gate_available?conf.gate.toFixed(1):'--')+' | Trades '+totalT;

  // Footer
  $('footAge').textContent='AGE: '+Math.round(age)+'s';

  // Celebrations
  maybeCelebrate(snap);

  // Reports (async)
}

function renderPipeline(bs,positions){
  // If animation is running, don't override — the animation handles highlighting
  if(_pipelineAnimTimer)return;
  const state=(bs&&bs.state)||'';
  let activeStep='scan';
  if(state==='scanning'||state==='initializing')activeStep='scan';
  else if(state==='analyzing')activeStep='detect';
  else if(state==='scoring')activeStep='validate';
  else if(state==='sizing')activeStep='size';
  else if(state==='executing')activeStep='fill';
  else if(state==='managing'||state==='locked')activeStep='settle';
  // If open positions, show MANAGE (settle) lit
  if(positions&&positions.length>0)activeStep='settle';
  document.querySelectorAll('.pipe-step').forEach(s=>{
    s.classList.toggle('active',s.dataset.step===activeStep);
  });
}

function triggerPipelineAnimation(positions){
  // Clear any existing animation
  if(_pipelineAnimTimer){clearTimeout(_pipelineAnimTimer);_pipelineAnimTimer=null;}
  const steps=['scan','detect','validate','size','fill','settle'];
  const durations=[1000,1000,1000,1000,500,500];// ms for each step
  _pipelineAnimStep=0;

  function lightStep(idx){
    document.querySelectorAll('.pipe-step').forEach(s=>{
      // Light up current and all previous steps up to current
      s.classList.toggle('active',steps.indexOf(s.dataset.step)<=idx);
    });
  }

  function advance(){
    if(_pipelineAnimStep>=steps.length){
      // Animation done — return to idle
      _pipelineAnimTimer=null;
      // If positions open, keep MANAGE (settle) lit
      if(positions&&positions.length>0){
        document.querySelectorAll('.pipe-step').forEach(s=>{
          s.classList.toggle('active',s.dataset.step==='settle');
        });
      }else{
        document.querySelectorAll('.pipe-step').forEach(s=>{
          s.classList.toggle('active',s.dataset.step==='scan');
        });
      }
      return;
    }
    lightStep(_pipelineAnimStep);
    _pipelineAnimTimer=setTimeout(()=>{
      _pipelineAnimStep++;
      advance();
    },durations[_pipelineAnimStep]||500);
  }
  advance();
}

function renderTraders(feed){
  const el=$('tradersPanel');
  const closes=feed.filter(f=>f.action==='CLOSE'&&typeof f.pnl==='number').slice(0,12);
  if(!closes.length){el.innerHTML='<div class="empty">Waiting for trades...</div>';return;}
  el.innerHTML=closes.map(c=>{
    const cls=c.pnl>=0?'green':'red';
    const sign=c.pnl>=0?'+':'';
    return '<div class="feed-item"><span class="time">'+(c.timestamp_utc||'').slice(11,19)+'</span><span class="'+cls+'" style="font-weight:700;">'+sign+'$'+Math.abs(c.pnl).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})+'</span><span style="margin-left:auto;color:var(--amber3);">'+(c.symbol||'')+'</span></div>';
  }).join('');
}

function renderFeed(feed){
  const el=$('feedList');
  if(!feed.length){el.innerHTML='<div class="empty">Waiting for activity...</div>';return;}
  const items=feed.slice(0,MAX_FEED);
  el.innerHTML=items.map(f=>{
    const t=(f.timestamp_utc||'').slice(11,19);
    const action=f.action||f.kind||'?';
    const pnlStr=typeof f.pnl==='number'?'<span class="'+(f.pnl>=0?'green':'red')+'">'+money(f.pnl)+'</span>':'';
    return '<div class="feed-item"><span class="time">'+t+'</span><span class="action '+action+'">'+action+'</span><span style="color:var(--amber);">'+(f.symbol||'')+'</span>'+pnlStr+'</div>';
  }).join('');
}

function renderLivePrices(snap){
  // Try to get BTC price from account equity or feed context
  const acct=snap.account||{};
  const feed=snap.feed||[];
  let btcPrice=null,xauPrice=null,btcChange=null,xauChange=null;

  // Check if snapshot has price data directly
  if(snap.prices){
    btcPrice=snap.prices.btcusd||snap.prices.BTCUSD||null;
    xauPrice=snap.prices.xauusd||snap.prices.XAUUSD||null;
    btcChange=snap.prices.btcusd_change||snap.prices.BTCUSD_change||null;
    xauChange=snap.prices.xauusd_change||snap.prices.XAUUSD_change||null;
  }

  // Try feed entries for price context
  if(!btcPrice&&feed.length>0){
    for(const f of feed){
      if(f.context&&f.context.price&&(f.symbol||'').includes('BTC')){
        btcPrice=f.context.price;
        if(f.context.daily_change!=null)btcChange=f.context.daily_change;
        break;
      }
    }
  }
  if(!xauPrice&&feed.length>0){
    for(const f of feed){
      if(f.context&&f.context.price&&(f.symbol||'').includes('XAU')){
        xauPrice=f.context.price;
        if(f.context.daily_change!=null)xauChange=f.context.daily_change;
        break;
      }
    }
  }

  // Try account-level data
  if(!btcPrice&&acct.btc_price)btcPrice=acct.btc_price;
  if(!xauPrice&&acct.xau_price)xauPrice=acct.xau_price;

  const btcEl=$('lpBtcPrice');
  const xauEl=$('lpXauPrice');
  const btcChEl=$('lpBtcChange');
  const xauChEl=$('lpXauChange');

  btcEl.textContent=btcPrice?'$'+Number(btcPrice).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}):'--';
  xauEl.textContent=xauPrice?'$'+Number(xauPrice).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'--';

  if(btcChange!=null){
    btcChEl.textContent=(btcChange>=0?'+':'')+btcChange.toFixed(2)+'%';
    btcChEl.className=btcChange>=0?'green':'red';
  }else{btcChEl.textContent='--';btcChEl.className='dim';}

  if(xauChange!=null){
    xauChEl.textContent=(xauChange>=0?'+':'')+xauChange.toFixed(2)+'%';
    xauChEl.className=xauChange>=0?'green':'red';
  }else{xauChEl.textContent='--';xauChEl.className='dim';}
}

function renderMetrics(ws,conf){
  const el=$('metricsPanel');
  const totalT=(ws.wins||0)+(ws.losses||0);
  const wr=totalT>0?((ws.wins||0)/totalT*100):0;
  const confVal=conf.gate_available?conf.gate:5;
  el.innerHTML=`
    <div style="font-size:9px;margin-bottom:4px;">WIN RATE</div>
    <div class="metrics-bar"><div class="metrics-fill" style="width:${wr}%;background:var(--green);"></div></div>
    <div style="font-size:8px;color:var(--amber3);margin-bottom:6px;">${wr.toFixed(1)}%</div>
    <div style="font-size:9px;margin-bottom:4px;">CONFIDENCE</div>
    <div class="metrics-bar"><div class="metrics-fill" style="width:${confVal*10}%;background:var(--amber);"></div></div>
    <div style="font-size:8px;color:var(--amber3);margin-bottom:6px;">${confVal.toFixed(1)}/10</div>
    <div style="font-size:9px;margin-bottom:4px;">VOLATILITY</div>
    <div class="metrics-bar"><div class="metrics-fill" style="width:45%;background:var(--amber2);"></div></div>
    <div style="font-size:8px;color:var(--amber3);">MODERATE</div>
  `;
}

// Celebration
function maybeCelebrate(snap){
  if(!S.ready)return;
  const feed=snap.feed||[];
  for(const f of feed){
    if(f.action==='CLOSE'&&f.is_win===true){
      const id=(f.timestamp_utc||'')+f.symbol;
      if(!S.seenCloses.has(id)){
        S.seenCloses.add(id);
        const ws=snap.win_stats||{};
        if((typeof f.pnl==='number'&&f.pnl>150)||(ws.win_streak>=3)){
          triggerTrophy(f,ws);
        }
      }
    }
  }
  if(!S._feedSeeded){
    S._feedSeeded=true;
    feed.forEach(f=>{if(f.action==='CLOSE')S.seenCloses.add((f.timestamp_utc||'')+f.symbol);});
  }
}

function triggerTrophy(f,ws){
  if(S.celebrating)return;
  S.celebrating=true;
  const el=$('trophy');
  el.style.display='flex';
  el.innerHTML='<div class="trophy-box"><div class="trophy-title">🏆 TROPHY UNLOCKED</div><div class="trophy-amount">+'+money(f.pnl).replace('-$','$')+'</div><div class="trophy-sub">SINGLE TRADE WIN — '+(f.symbol||'BTC')+'</div></div>';
  launchConfetti();
  setTimeout(()=>{el.style.display='none';S.celebrating=false;},4000);
}

function launchConfetti(){
  const canvas=$('confettiCanvas');
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth*2;canvas.height=window.innerHeight*2;
  const colors=['#f0c419','#ffb000','#26d07c','#d4a012'];
  const particles=[];
  for(let i=0;i<60;i++){
    particles.push({x:canvas.width/2+(Math.random()-0.5)*300,y:canvas.height/2-100,vx:(Math.random()-0.5)*10,vy:-(Math.random()*6+3),size:Math.random()*5+2,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rv:(Math.random()-0.5)*8});
  }
  let frames=0;
  function anim(){
    if(frames++>100){ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';return;}
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.rot+=p.rv;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      ctx.restore();
    });
    requestAnimationFrame(anim);
  }
  anim();
}

// Data flow
async function loadInitial(){
  try{
    const res=await fetch('/api/snapshot');
    if(res.ok){const data=await res.json();render(data);}
  }catch(e){}
  try{
    const res=await fetch('/api/reports');
    if(res.ok){const reports=await res.json();if(S.snapshot){S.snapshot.reports=reports;}}
  }catch(e){}
  connectSSE();
}

function connectSSE(){
  if(S.sse){try{S.sse.close();}catch(e){}}
  const es=new EventSource('/api/stream');
  S.sse=es;
  es.addEventListener('snapshot',ev=>{
    S.reconnects=0;
    try{render(JSON.parse(ev.data));}catch(e){}
  });
  es.onopen=()=>{S.reconnects=0;};
  es.onerror=()=>{
    es.close();
    if(S.reconnects>=MAX_RECONNECT)return;
    S.reconnects++;
    setTimeout(connectSSE,Math.min(S.reconnects*RECONNECT_BASE,5000));
  };
}

// Client countdown tick
setInterval(()=>{
  if(!S.snapshot||!_lastSnapAt)return;
  const elapsed=(Date.now()-_lastSnapAt)/1000;
  const currentAge=_lastAge+elapsed;
  const secs=Math.max(0,SCAN_INTERVAL-Math.round(currentAge));
  $('pipeCountdown').textContent=secs+'s';
  $('footAge').textContent='AGE: '+Math.round(currentAge)+'s';
},1000);

// Boot
loadInitial();
