<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX TRADING BOT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#8af;font-family:'JetBrains Mono',monospace;min-height:100vh;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a1428 0%,#060a14 100%);z-index:0}
body::after{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,255,200,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,200,0.02) 1px,transparent 1px);background-size:60px 60px;z-index:0;animation:gridFloat 40s linear infinite}
@keyframes gridFloat{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
.container{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:20px}
.top-section{text-align:center;width:100%}
.title{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#d4a017;letter-spacing:6px;text-shadow:0 0 20px rgba(212,160,23,0.5)}
.subtitle{font-size:10px;color:#5a7a8a;letter-spacing:3px;margin-top:6px}
.live-badge{position:absolute;top:20px;right:30px;display:flex;align-items:center;gap:6px;font-size:11px;color:#0f8}
.live-badge::before{content:'';width:8px;height:8px;background:#0f8;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 4px #0f8}50%{box-shadow:0 0 16px #0f8,0 0 30px #0f8}}
.middle-section{display:flex;align-items:center;justify-content:center;gap:0;width:100%;flex:1;position:relative}
.center-ring{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.center-ring .outer{position:absolute;inset:0;border-radius:50%;border:3px solid #0c6;box-shadow:0 0 20px rgba(0,200,100,0.3),inset 0 0 20px rgba(0,200,100,0.1);animation:ringPulse 3s ease-in-out infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 20px rgba(0,200,100,0.3),inset 0 0 20px rgba(0,200,100,0.1)}50%{box-shadow:0 0 40px rgba(0,200,100,0.5),inset 0 0 30px rgba(0,200,100,0.2)}}
.center-ring .inner{position:absolute;inset:20px;border-radius:50%;border:2px solid #1a3a3a;background:radial-gradient(circle,#0a1a1a 0%,#060e14 100%)}
.center-ring .content{position:relative;text-align:center;z-index:2}
.center-ring .label{font-size:9px;color:#5a8a7a;text-transform:uppercase;letter-spacing:2px}
.center-ring .value{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:700;color:#fff;margin:4px 0}
.center-ring .sub{font-size:10px;color:#5a8a7a;text-transform:uppercase;letter-spacing:1px}
.side-nodes{display:flex;flex-direction:column;gap:30px;align-items:center}
.node{background:rgba(10,20,30,0.8);border:1px solid #1a3a4a;border-radius:6px;padding:10px 16px;text-align:center;min-width:120px;position:relative}
.node::before{content:'';position:absolute;top:50%;width:40px;height:1px;background:linear-gradient(90deg,rgba(0,200,150,0.4),transparent)}
.left-nodes .node::before{right:-40px}
.right-nodes .node::before{left:-40px}
.node .node-label{font-size:8px;color:#4a6a7a;text-transform:uppercase;letter-spacing:1px}
.node .node-value{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;margin-top:4px}
.node .node-sub{font-size:8px;color:#4a6a7a;margin-top:2px}
.green{color:#0f8}
.yellow{color:#d4a017}
.red{color:#f44}
.cyan{color:#0cf}
.white{color:#fff}
.connector-lines{position:absolute;inset:0;pointer-events:none;z-index:0}
.connector-lines svg{width:100%;height:100%;opacity:0.3}
.bottom-section{text-align:center;width:100%;padding-bottom:10px}
.bottom-box{display:inline-block;background:rgba(0,40,40,0.6);border:1px solid #0a6;border-radius:6px;padding:12px 30px;margin-bottom:10px}
.bottom-box .amount{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;color:#0f8}
.bottom-box .per{font-size:9px;color:#5a8a7a;letter-spacing:2px;margin-top:4px}
.total-earned{font-size:12px;color:#4a6a7a;letter-spacing:2px}
.total-earned span{font-family:'Orbitron',sans-serif;font-size:18px;color:#0cf;margin-left:8px}
.signal-bar{position:absolute;bottom:60px;left:20px;font-size:8px;color:#3a5a6a;display:flex;gap:4px;flex-wrap:wrap;max-width:300px}
.signal-bar .sig{padding:2px 5px;border:1px solid #1a3a4a;border-radius:2px}
.signal-bar .sig.win{border-color:#0a4;color:#0f8}
.signal-bar .sig.loss{border-color:#400;color:#f44}
</style>
</head>
<body>
<div class="container">
  <div class="top-section">
    <div class="title">VORTEX TRADING BOT</div>
    <div class="subtitle">NAS100 &nbsp;&bull;&nbsp; 15MIN &nbsp;&bull;&nbsp; MOMENTUM ENGINE &nbsp;&bull;&nbsp; LIVE</div>
  </div>
  <div class="live-badge">LIVE</div>

  <div class="middle-section">
    <div class="side-nodes left-nodes">
      <div class="node"><div class="node-label">NAS100 Price</div><div class="node-value cyan" id="nPrice">—</div><div class="node-sub">LIVE FEED</div></div>
      <div class="node"><div class="node-label">1H Trend</div><div class="node-value green" id="nTrend">—</div><div class="node-sub" id="nTrendSub">SCANNING</div></div>
      <div class="node"><div class="node-label">Signal</div><div class="node-value yellow" id="nSignal">—</div><div class="node-sub" id="nSignalSub">WAITING</div></div>
    </div>

    <div class="center-ring">
      <div class="outer"></div>
      <div class="inner"></div>
      <div class="content">
        <div class="label">BOT</div>
        <div class="value" id="cTrades">0</div>
        <div class="sub">TRADES</div>
      </div>
    </div>

    <div class="side-nodes right-nodes">
      <div class="node"><div class="node-label">Profit</div><div class="node-value green" id="nProfit">$0</div><div class="node-sub" id="nProfitSub">NET P&L</div></div>
      <div class="node"><div class="node-label">Win Rate</div><div class="node-value white" id="nWR">—</div><div class="node-sub">OF ALL TRADES</div></div>
      <div class="node"><div class="node-label">Drawdown</div><div class="node-value" id="nDD">0%</div><div class="node-sub">MAX 10%</div></div>
    </div>
  </div>

  <div class="signal-bar" id="sigBar"></div>

  <div class="bottom-section">
    <div class="bottom-box">
      <div class="amount" id="bWeekly">$0</div>
      <div class="per">PER WEEK &nbsp;&bull;&nbsp; AVG</div>
    </div>
    <div class="total-earned">TOTAL EARNED<span id="bTotal">$0</span></div>
  </div>
</div>

<script>
const API = window.location.origin;

async function poll() {
  try {
    const r = await fetch(API + '/api/state');
    const d = await r.json();

    // Price
    const priceEl = document.getElementById('nPrice');
    if (d.price > 0) {
      priceEl.textContent = '$' + d.price.toLocaleString(undefined,{maximumFractionDigits:0});
    } else {
      priceEl.textContent = '—';
    }

    // Trades
    document.getElementById('cTrades').textContent = d.total_trades || 0;

    // Profit
    const pnl = d.net_pnl || 0;
    const profEl = document.getElementById('nProfit');
    profEl.textContent = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toFixed(0);
    profEl.className = 'node-value ' + (pnl >= 0 ? 'green' : 'red');

    // Win rate
    document.getElementById('nWR').textContent = d.total_trades > 0 ? d.win_rate.toFixed(0) + '%' : '—';

    // Drawdown
    const ddEl = document.getElementById('nDD');
    ddEl.textContent = d.drawdown_pct.toFixed(1) + '%';
    ddEl.className = 'node-value ' + (d.drawdown_pct > 5 ? 'red' : 'green');

    // Weekly avg
    const weeks = Math.max(1, d.total_trades / 2);  // rough
    document.getElementById('bWeekly').textContent = '$' + Math.abs(pnl / Math.max(1, weeks)).toFixed(0);
    document.getElementById('bTotal').textContent = (pnl >= 0 ? '$' : '-$') + Math.abs(pnl).toFixed(0);

    // Open trade
    if (d.open_trade) {
      document.getElementById('nSignal').textContent = d.open_trade.direction;
      document.getElementById('nSignal').className = 'node-value ' + (d.open_trade.direction === 'BUY' ? 'green' : 'red');
      document.getElementById('nSignalSub').textContent = '@ $' + d.open_trade.entry;
      document.getElementById('nTrend').textContent = d.open_trade.direction === 'BUY' ? 'UP' : 'DOWN';
      document.getElementById('nTrendSub').textContent = 'ACTIVE';
    } else {
      document.getElementById('nSignal').textContent = '—';
      document.getElementById('nSignal').className = 'node-value yellow';
      document.getElementById('nSignalSub').textContent = 'WAITING';
    }

    // Signal history bar
    const sr = await fetch(API + '/api/signals');
    const sigs = await sr.json();
    const bar = document.getElementById('sigBar');
    bar.innerHTML = sigs.slice(-20).map(s => {
      if (s.pnl > 0) return '<div class="sig win">W</div>';
      if (s.pnl !== null && s.pnl <= 0) return '<div class="sig loss">L</div>';
      return '<div class="sig">?</div>';
    }).join('');

  } catch(e) {}
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
