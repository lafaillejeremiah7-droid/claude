<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLD VORTEX v5 — Live Signal Terminal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap');

:root {
  --cyan: #00f0ff;
  --cyan-dim: #00f0ff33;
  --magenta: #ff00e5;
  --gold: #ffd700;
  --green: #00ff88;
  --red: #ff3366;
  --bg: #0a0a12;
  --panel: #0d0d1a;
  --border: #1a1a3a;
  --text: #e0e0ff;
  --text-dim: #6a6a8a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

/* Scan line effect */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  animation: scanline 4s linear infinite;
  pointer-events: none;
  z-index: 999;
  opacity: 0.4;
}

@keyframes scanline {
  0% { top: -3px; }
  100% { top: 100vh; }
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 30px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 30px;
  position: relative;
}

.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.2em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 40px rgba(0,240,255,0.3);
  letter-spacing: 3px;
}

.header .subtitle {
  font-size: 0.8em;
  color: var(--text-dim);
  margin-top: 8px;
  letter-spacing: 2px;
}

.header .live-badge {
  display: inline-block;
  margin-top: 12px;
  padding: 4px 16px;
  border: 1px solid var(--green);
  border-radius: 20px;
  font-size: 0.7em;
  color: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 5px var(--green); }
  50% { opacity: 0.6; box-shadow: 0 0 20px var(--green); }
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
}

.stat-card .label {
  font-size: 0.65em;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-card .value {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4em;
  font-weight: 700;
  margin-top: 6px;
  color: var(--cyan);
}

.stat-card .value.profit { color: var(--green); }
.stat-card .value.loss { color: var(--red); }
.stat-card .value.gold { color: var(--gold); }

/* Signal feed */
.signal-feed {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.signal-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.5s ease-out;
  transition: border-color 0.3s;
}

.signal-card:hover {
  border-color: var(--cyan);
}

.signal-card.buy { border-left: 4px solid var(--green); }
.signal-card.sell { border-left: 4px solid var(--red); }

.signal-card .glow {
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at center, var(--cyan-dim), transparent 60%);
  opacity: 0;
  transition: opacity 0.5s;
}

.signal-card:hover .glow { opacity: 1; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.signal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.signal-direction {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4em;
  font-weight: 900;
  letter-spacing: 2px;
}

.signal-direction.buy { color: var(--green); }
.signal-direction.sell { color: var(--red); }

.signal-time {
  font-size: 0.75em;
  color: var(--text-dim);
}

.signal-confidence {
  display: flex;
  align-items: center;
  gap: 8px;
}

.confidence-bar {
  width: 80px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.confidence-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s;
}

.confidence-fill.high { background: var(--green); }
.confidence-fill.med { background: var(--gold); }
.confidence-fill.low { background: var(--red); }

/* Trade levels */
.trade-levels {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin: 16px 0;
}

.level-box {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}

.level-box .level-label {
  font-size: 0.6em;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.level-box .level-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1em;
  font-weight: 600;
}

.level-box.entry .level-value { color: var(--cyan); }
.level-box.sl .level-value { color: var(--red); }
.level-box.tp .level-value { color: var(--green); }
.level-box.size .level-value { color: var(--gold); }

/* Reasoning */
.signal-reason {
  margin-top: 16px;
  padding: 14px;
  background: rgba(0,240,255,0.03);
  border: 1px solid var(--cyan-dim);
  border-radius: 8px;
  font-size: 0.8em;
  line-height: 1.6;
  color: var(--text);
}

.signal-reason::before {
  content: 'BOT REASONING';
  display: block;
  font-size: 0.7em;
  font-weight: 600;
  color: var(--cyan);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

/* Result badge */
.result-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  padding: 8px 16px;
  border-radius: 8px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8em;
  font-weight: 700;
}

.result-badge.win {
  background: rgba(0,255,136,0.1);
  border: 1px solid var(--green);
  color: var(--green);
}

.result-badge.loss {
  background: rgba(255,51,102,0.1);
  border: 1px solid var(--red);
  color: var(--red);
}

.result-badge.pending {
  background: rgba(0,240,255,0.1);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  animation: pulse 2s ease-in-out infinite;
}

/* Meta row */
.meta-row {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  font-size: 0.7em;
  color: var(--text-dim);
}

.meta-row span { display: flex; align-items: center; gap: 4px; }

/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 1.4em; }
  .stats-bar { grid-template-columns: repeat(3, 1fr); }
  .trade-levels { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>GOLD VORTEX</h1>
    <div class="subtitle">XAU/USD MOMENTUM SIGNAL TERMINAL</div>
    <div class="live-badge">&#9679; LIVE</div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="label">Account</div><div class="value gold" id="equity">$5,000</div></div>
    <div class="stat-card"><div class="label">Net P&L</div><div class="value profit" id="netPnl">$0.00</div></div>
    <div class="stat-card"><div class="label">Win Rate</div><div class="value" id="winRate">—</div></div>
    <div class="stat-card"><div class="label">Trades</div><div class="value" id="totalTrades">0</div></div>
    <div class="stat-card"><div class="label">Today P&L</div><div class="value" id="todayPnl">$0.00</div></div>
    <div class="stat-card"><div class="label">Drawdown</div><div class="value" id="drawdown">0.0%</div></div>
    <div class="stat-card"><div class="label">Avg Duration</div><div class="value" id="avgDur">—</div></div>
    <div class="stat-card"><div class="label">Profit Factor</div><div class="value" id="profitFactor">—</div></div>
  </div>

  <!-- Signal Feed -->
  <div class="signal-feed" id="signalFeed">
    <!-- Signals injected here by JS -->
    <div class="signal-card" style="text-align:center; padding:60px;">
      <div style="color:var(--text-dim); font-size:0.9em;">Waiting for signals...</div>
      <div style="color:var(--cyan); font-size:0.7em; margin-top:10px;">The bot scans every 5 minutes during London+NY session (07:00-20:00 UTC)</div>
    </div>
  </div>
</div>

<script>
// Demo data: inject signals to show the dashboard in action
const demoSignals = [
  {
    direction: "BUY", time: "2026-01-09 17:05 UTC", entry: 4516.40,
    sl: 4505.32, tp: 4533.02, slDist: 11.08, tpDist: 16.62,
    rr: "1:1.5", lots: 0.11, risk: 121.85, riskPct: 2.5,
    confidence: 80, atr: 3.16, equity: 5000.00,
    reason: "EMA5 crossed above EMA21 (momentum shift bullish), RSI confirms above 45, 1H trend aligned UP | Price above EMA50 (strong structure)",
    result: "TP", pnl: 258.67, rMultiple: 1.5, duration: "1.3h"
  },
  {
    direction: "SELL", time: "2026-01-15 14:20 UTC", entry: 4591.60,
    sl: 4612.53, tp: 4560.20, slDist: 20.93, tpDist: 31.40,
    rr: "1:1.5", lots: 0.06, risk: 125.58, riskPct: 2.5,
    confidence: 70, atr: 5.98, equity: 5258.67,
    reason: "RSI dropped through 50 from above (momentum collapse), price below EMA21, 1H downtrend | Price below EMA50 (strong structure)",
    result: "TP", pnl: 188.40, rMultiple: 1.5, duration: "2.8h"
  },
  {
    direction: "BUY", time: "2026-01-20 08:10 UTC", entry: 4721.40,
    sl: 4700.47, tp: 4752.80, slDist: 20.93, tpDist: 31.40,
    rr: "1:1.5", lots: 0.06, risk: 136.17, riskPct: 2.5,
    confidence: 75, atr: 5.98, equity: 5447.07,
    reason: "MACD histogram flipped positive (buying pressure resuming), EMA stack bullish, 1H uptrend",
    result: "PENDING", pnl: null, rMultiple: null, duration: null
  }
];

function renderStats(signals) {
  const completed = signals.filter(s => s.result !== "PENDING");
  const wins = completed.filter(s => s.pnl > 0);
  const losses = completed.filter(s => s.pnl <= 0);
  const totalPnl = completed.reduce((a, s) => a + (s.pnl || 0), 0);
  const lastEquity = signals.length > 0 ? signals[signals.length-1].equity + totalPnl : 5000;

  document.getElementById('equity').textContent = '$' + lastEquity.toLocaleString(undefined, {minimumFractionDigits:0});
  document.getElementById('netPnl').textContent = '$' + totalPnl.toFixed(2);
  document.getElementById('netPnl').className = 'value ' + (totalPnl >= 0 ? 'profit' : 'loss');
  document.getElementById('winRate').textContent = completed.length > 0 ? (wins.length/completed.length*100).toFixed(1) + '%' : '—';
  document.getElementById('totalTrades').textContent = completed.length;
  document.getElementById('avgDur').textContent = completed.length > 0 ? (completed.reduce((a,s) => a + parseFloat(s.duration), 0) / completed.length).toFixed(1) + 'h' : '—';

  const grossWin = wins.reduce((a,s) => a + s.pnl, 0);
  const grossLoss = Math.abs(losses.reduce((a,s) => a + s.pnl, 0));
  document.getElementById('profitFactor').textContent = grossLoss > 0 ? (grossWin/grossLoss).toFixed(2) : '—';
}

function renderSignal(sig, index) {
  const isBuy = sig.direction === "BUY";
  const dirClass = isBuy ? "buy" : "sell";
  const confLevel = sig.confidence >= 70 ? "high" : sig.confidence >= 55 ? "med" : "low";

  let resultHtml = '';
  if (sig.result === "PENDING") {
    resultHtml = `<div class="result-badge pending">&#9679; LIVE — PENDING</div>`;
  } else if (sig.pnl > 0) {
    resultHtml = `<div class="result-badge win">&#10003; ${sig.result} | +$${sig.pnl.toFixed(2)} (+${sig.rMultiple.toFixed(1)}R) | ${sig.duration}</div>`;
  } else {
    resultHtml = `<div class="result-badge loss">&#10007; ${sig.result} | $${sig.pnl.toFixed(2)} (${sig.rMultiple.toFixed(1)}R) | ${sig.duration}</div>`;
  }

  return `
  <div class="signal-card ${dirClass}" style="animation-delay: ${index * 0.1}s">
    <div class="glow"></div>
    <div class="signal-header">
      <div>
        <div class="signal-direction ${dirClass}">${sig.direction}</div>
        <div class="signal-time">${sig.time}</div>
      </div>
      <div class="signal-confidence">
        <span style="font-size:0.7em; color:var(--text-dim)">CONFIDENCE</span>
        <div class="confidence-bar"><div class="confidence-fill ${confLevel}" style="width:${sig.confidence}%"></div></div>
        <span style="font-family:'Orbitron'; font-size:0.8em; color:var(--${confLevel === 'high' ? 'green' : confLevel === 'med' ? 'gold' : 'red'})">${sig.confidence}%</span>
      </div>
    </div>
    <div class="trade-levels">
      <div class="level-box entry"><div class="level-label">Entry</div><div class="level-value">$${sig.entry.toFixed(2)}</div></div>
      <div class="level-box sl"><div class="level-label">Stop Loss</div><div class="level-value">$${sig.sl.toFixed(2)}</div></div>
      <div class="level-box tp"><div class="level-label">Take Profit</div><div class="level-value">$${sig.tp.toFixed(2)}</div></div>
      <div class="level-box size"><div class="level-label">Size</div><div class="level-value">${sig.lots} lots</div></div>
    </div>
    <div class="meta-row">
      <span>R:R ${sig.rr}</span>
      <span>Risk: $${sig.risk.toFixed(2)} (${sig.riskPct}%)</span>
      <span>ATR: $${sig.atr.toFixed(2)}</span>
      <span>Equity: $${sig.equity.toLocaleString()}</span>
    </div>
    <div class="signal-reason">${sig.reason}</div>
    ${resultHtml}
  </div>`;
}

function renderDashboard() {
  const feed = document.getElementById('signalFeed');
  feed.innerHTML = demoSignals.map((s, i) => renderSignal(s, i)).join('');
  renderStats(demoSignals);
}

renderDashboard();
</script>
</body>
</html>
